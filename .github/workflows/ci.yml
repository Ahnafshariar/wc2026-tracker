name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Smoke test (boot server + hit /api/health)
        run: |
          SIM_INTERVAL=200 node server.js &
          SERVER_PID=$!
          sleep 3
          curl -fsS http://localhost:3000/api/health
          curl -fsS http://localhost:3000/api/state
          kill $SERVER_PID

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t wc2026-tracker:${{ github.sha }} .
