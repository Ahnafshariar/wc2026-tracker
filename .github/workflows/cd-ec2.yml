name: Deploy to EC2

# Runs only after CI succeeds on main.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    # only deploy if CI actually passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH and restart with PM2
        uses: appleboy/ssh-action@v1.0.3
        env:
          # the secret is read on the runner and passed into the remote shell
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        with:
          # ── Set these in: repo Settings → Secrets and variables → Actions ──
          #   EC2_HOST          public IP / DNS of the instance
          #   EC2_USER          e.g. ubuntu
          #   EC2_SSH_KEY       the PRIVATE deploy key (never commit it)
          #   FOOTBALL_API_KEY  your football-data.org key
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: FOOTBALL_API_KEY
          script: |
            set -e
            APP_DIR=~/wc2026-tracker
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/Ahnafshariar/wc2026-tracker.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git pull origin main
            npm ci --omit=dev
            # write runtime env from the GitHub secret — never committed, locked down
            cat > .env <<ENV
            DATA_SOURCE=footballdata
            FOOTBALL_API_KEY=$FOOTBALL_API_KEY
            REFRESH_INTERVAL=60000
            ENV
            chmod 600 .env
            pm2 startOrReload ecosystem.config.js --update-env
            pm2 save

# ──────────────────────────────────────────────────────────────────────────
# MORE SECURE ALTERNATIVE (recommended): instead of an SSH key in secrets,
# use GitHub OIDC -> a short-lived AWS role -> SSM Send-Command to deploy.
# That removes long-lived SSH keys entirely (matches the no-SSH/SSM pattern
# used in the AWS VPC project). See AWS "configure-aws-credentials" + SSM docs.
# ──────────────────────────────────────────────────────────────────────────
